<template id="02-generator-template">
  <div id="02-generator" data-composition-id="02-generator" data-width="1920" data-height="1080">
    <style>
      #02-generator {
        width: 100%;
        height: 100%;
        background: #09090b;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        color: #ffffff;
      }

      /* Light background glow */
      .bg-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1000px;
        height: 1000px;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 60%);
        pointer-events: none;
      }

      /* Interactive Input Box Mockup (Unified Input Area) */
      .input-box {
        width: 800px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(124, 58, 237, 0.3);
        border-radius: 24px;
        padding: 24px 32px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        z-index: 10;
        margin-bottom: 50px;
        backdrop-filter: blur(16px);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 16px;
        margin-bottom: 16px;
      }

      .greeting-bar {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .greeting-text {
        font-size: 16px;
        font-weight: 500;
        color: #e4e4e7;
      }

      .agent-pill {
        background: rgba(124, 58, 237, 0.15);
        border: 1px solid rgba(124, 58, 237, 0.3);
        color: #c084fc;
        font-size: 13px;
        padding: 4px 12px;
        border-radius: 9999px;
        font-weight: 500;
      }

      .card-body {
        min-height: 120px;
        display: flex;
        align-items: flex-start;
      }

      .input-text {
        font-size: 26px;
        font-weight: 500;
        color: #f4f4f5;
        flex-grow: 1;
        line-height: 1.6;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
      }

      .cursor {
        display: inline-block;
        width: 3px;
        height: 28px;
        background: #a855f7;
        margin-left: 6px;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
      }

      .toolbar-left {
        display: flex;
        gap: 20px;
      }

      .tool-icon {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.45);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .generate-btn {
        background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        padding: 10px 24px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
      }

      /* Workbench View Area */
      .workbench-container {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 8;
        overflow: hidden;
        opacity: 0;
      }

      .workbench-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .caption-card {
        position: absolute;
        bottom: 60px;
        background: rgba(15, 15, 20, 0.9);
        border: 2px solid rgba(124, 58, 237, 0.4);
        border-radius: 16px;
        padding: 18px 40px;
        font-size: 26px;
        font-weight: 700;
        color: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(124, 58, 237, 0.2);
        z-index: 12;
        letter-spacing: 2px;
      }

      /* Pulse ring */
      .pulse-ring {
        position: absolute;
        width: 800px;
        height: 800px;
        border: 2px solid rgba(124, 58, 237, 0.3);
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
        transform: scale(0.1);
        z-index: 5;
      }
    </style>

    <div class="bg-glow"></div>
    <div class="pulse-ring" id="pulse"></div>

    <!-- Input Phase (Unified Input Area) -->
    <div class="input-box" id="box">
      <!-- Card Header -->
      <div class="card-header">
        <div class="greeting-bar">
          <div class="user-avatar">👤</div>
          <div class="greeting-text">你好，想开始创作一堂什么课？</div>
        </div>
        <div class="agent-pill">🤖 多智能体协同</div>
      </div>
      <!-- Card Body -->
      <div class="card-body">
        <div class="input-text" id="prompt-txt">
          <span id="text-holder"></span>
          <span class="cursor" id="input-cursor"></span>
        </div>
      </div>
      <!-- Card Footer -->
      <div class="card-footer">
        <div class="toolbar-left">
          <span class="tool-icon">🌐 开启 Web 搜索</span>
          <span class="tool-icon">📎 导入 PDF/文档</span>
          <span class="tool-icon">⚙️ 设置</span>
        </div>
        <div class="generate-btn">一键生成</div>
      </div>
    </div>

    <!-- Workbench Phase -->
    <div class="workbench-container" id="workbench-view" data-layout-allow-overflow>
      <img src="assets/images/工作台.png" class="workbench-img" id="workbench-img" />
      <div class="caption-card" id="workbench-caption">
        一键生成：从 idea 到完整课件仅需几分钟
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Cursor blink
      gsap.to("#input-cursor", { opacity: 0, duration: 0.5, repeat: 19, yoyo: true }); // repeat = duration (10s) / 0.5 - 1

      // 1. Entrance of Input Box
      tl.from("#box", { y: 50, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.2);

      // 2. Typing animation (simulate prompt typing)
      const textObj = { val: "" };
      const promptStr = "21天AI漫剧全能创业大师班";
      
      tl.to(textObj, {
        duration: 1.8,
        onUpdate: () => {
          const charCount = Math.floor(textObj.val * promptStr.length);
          document.getElementById("text-holder").textContent = promptStr.slice(0, charCount);
        },
        ease: "none",
        val: 1
      }, 1.2);

      // 3. Pulse Trigger (click/enter)
      tl.to("#box", { scale: 0.96, duration: 0.15, yoyo: true, repeat: 1 }, 3.2);
      tl.to("#pulse", { opacity: 1, scale: 1.3, duration: 0.5, ease: "expo.out" }, 3.3);
      tl.to("#pulse", { opacity: 0, duration: 0.3 }, 3.8);

      // 4. Switch to build phase
      tl.to("#box", { y: -50, scale: 0.85, opacity: 0, duration: 0.5, ease: "power2.in" }, 3.6);
      
      // 5. Workbench slide up/fade in and zoom
      tl.to("#workbench-view", { opacity: 1, duration: 0.8 }, 4.0);
      tl.fromTo("#workbench-img", { scale: 1.08, x: -15, y: -8 }, { scale: 1.0, x: 0, y: 0, duration: 8.5, ease: "sine.out" }, 4.0);
      tl.from("#workbench-caption", { y: 40, opacity: 0, duration: 0.8, ease: "power3.out" }, 4.4);

      window.__timelines["02-generator"] = tl;
    </script>
  </div>
</template>
