<template id="05-export-template">
  <div id="05-export" data-composition-id="05-export" data-width="1920" data-height="1080">
    <style>
      #05-export {
        width: 100%;
        height: 100%;
        background: #09090b;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 50px;
        padding: 80px 100px;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
        color: #ffffff;
        overflow: hidden;
      }

      /* Card layout */
      .panel-card {
        background: rgba(20, 20, 25, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 24px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        padding: 40px;
        display: flex;
        flex-direction: column;
        height: 100%;
        box-sizing: border-box;
      }

      .panel-label {
        font-size: 16px;
        font-weight: 700;
        color: #a1a1aa;
        margin-bottom: 30px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Left Panel: Feature Column 5 Highlight */
      .simulation-area {
        flex-grow: 1;
        background: #0d0d11;
        border: 1px solid rgba(99, 102, 241, 0.15);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
      }

      .feature-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .feature-img {
        width: 100%;
        height: auto;
        display: block;
      }

      .feature-highlighter {
        position: absolute;
        height: 100%;
        top: 0;
        box-sizing: border-box;
        border-radius: 12px;
        opacity: 0;
        pointer-events: none;
      }

      #highlight-feature1 {
        left: 0%;
        width: 20%;
        border: 3px solid #7c3aed;
        box-shadow: inset 0 0 20px rgba(124, 58, 237, 0.3), 0 0 20px rgba(124, 58, 237, 0.8);
      }

      #highlight-feature5 {
        left: 80%;
        width: 20%;
        border: 3px solid #7c3aed;
        box-shadow: inset 0 0 20px rgba(124, 58, 237, 0.3), 0 0 20px rgba(124, 58, 237, 0.8);
      }

      /* Right Panel: Lark/Slack Chat Integration */
      .chat-window {
        flex-grow: 1;
        background: #0f1015;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow: hidden;
      }

      .chat-header {
        font-size: 15px;
        color: #a1a1aa;
        font-weight: 600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #10b981;
      }

      .message-row {
        display: flex;
        gap: 12px;
        width: 100%;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .user-bubble {
        background: #7c3aed;
        color: white;
        border-radius: 16px 16px 0 16px;
        padding: 12px 18px;
        font-size: 16px;
        max-width: 80%;
      }

      .bot-bubble {
        background: #1e1e24;
        color: #e4e4e7;
        border-radius: 0 16px 16px 16px;
        padding: 12px 18px;
        font-size: 16px;
        max-width: 80%;
      }

      /* OpenClaw interactive card in Lark */
      .claw-card {
        background: rgba(30, 30, 40, 0.6);
        border: 1px solid rgba(124, 58, 237, 0.3);
        border-radius: 16px;
        padding: 20px;
        width: 85%;
        margin-left: 56px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 16px;
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }

      .card-top {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .card-logo {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }

      .card-title {
        font-size: 18px;
        font-weight: 700;
      }

      .card-btn {
        background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        border-radius: 10px;
        padding: 10px 0;
        font-size: 15px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
      }
    </style>

    <!-- Left Column: Export Cards -->
    <div class="panel-card" id="card-left">
      <div class="panel-label">💾 灵活的多格式离线导出</div>
      <div class="simulation-area">
        <div class="feature-wrapper">
          <img src="assets/images/特色.png" class="feature-img" id="feature-img" />
          <div class="feature-highlighter" id="highlight-feature1" data-layout-allow-overflow></div>
          <div class="feature-highlighter" id="highlight-feature5" data-layout-allow-overflow></div>
        </div>
      </div>
    </div>

    <!-- Right Column: OpenClaw Chat Window -->
    <div class="panel-card" id="card-right">
      <div class="panel-label">🤖 OpenClaw 聊天生态支持</div>
      <div class="chat-window">
        <div class="chat-header">
          <div class="status-dot"></div>
          <span>飞书 · AI 助手 (Claw)</span>
        </div>

        <div class="message-row user" id="user-msg-row" style="opacity:0;">
          <div class="user-bubble">
            <span id="user-text"></span>
          </div>
        </div>

        <div class="message-row" id="bot-msg-row" style="opacity:0;">
          <div class="bot-bubble">正在为您一键构建“21天AI漫剧全能创业大师班”...</div>
        </div>

        <!-- Simulated Rich Card -->
        <div class="claw-card" id="rich-card">
          <div class="card-top">
            <div class="card-logo">🎓</div>
            <div class="card-title">21天AI漫剧全能创业大师班</div>
          </div>
          <div class="export-desc">
            您的 AI 互动课堂已成功生成！包含了 15 页幻灯片、商业分析与平台运营实战模拟以及随堂测验。麦克老师已上线。
          </div>
          <div class="card-btn">点击进入课堂</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 1. Entrance of Panels
      tl.from("#card-left", { x: -80, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.2);
      tl.from("#card-right", { x: 80, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.4);

      // Highlight Column 1 (一键生成) and Column 5 (灵活导出)
      tl.to(["#highlight-feature1", "#highlight-feature5"], { opacity: 1, duration: 0.4 }, 1.2);
      tl.to(["#highlight-feature1", "#highlight-feature5"], { scale: 1.03, duration: 0.5, repeat: 3, yoyo: true, ease: "sine.inOut" }, 1.6);

      // 3. Lark Integration Animation
      // Show user message row
      tl.set("#user-msg-row", { opacity: 1 }, 3.0);
      // Typewriter simulator
      const chatTxtObj = { val: 0 };
      const chatStr = "教我AI漫剧变现与运营";
      tl.to(chatTxtObj, {
        duration: 1.2,
        onUpdate: () => {
          const charCount = Math.floor(chatTxtObj.val * chatStr.length);
          document.getElementById("user-text").textContent = chatStr.slice(0, charCount);
        },
        ease: "none",
        val: 1
      }, 3.0);

      // Bot typing & card response (timings: 4.8s, 6.0s)
      tl.to("#bot-msg-row", { opacity: 1, duration: 0.4 }, 4.8);
      tl.to("#rich-card", { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: "back.out" }, 6.0);

      // Button glow loop (calculated for duration 10s)
      tl.to(".card-btn", { scale: 1.04, duration: 0.8, repeat: 3, yoyo: true, ease: "sine.inOut" }, 6.8);

      window.__timelines["05-export"] = tl;
    </script>
  </div>
</template>
