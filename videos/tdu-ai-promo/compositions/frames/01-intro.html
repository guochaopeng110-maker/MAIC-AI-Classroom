<template id="01-intro-template">
  <div id="01-intro" data-composition-id="01-intro" data-width="1920" data-height="1080">
    <style>
      #01-intro {
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #1e1b4b 0%, #09090b 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        font-family: 'Outfit', 'Inter', sans-serif;
        color: #ffffff;
      }

      /* Grid Background */
      .grid-overlay {
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
        background-size: 80px 80px;
        background-position: center;
        mask-image: radial-gradient(circle at center, black, transparent 80%);
        pointer-events: none;
      }

      /* Glow Particles */
      .particle {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #7c3aed;
        filter: blur(2px);
        opacity: 0.6;
      }

      /* Logo & Heading container */
      .logo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        z-index: 10;
        text-align: center;
      }

      .logo-img {
        height: 120px;
        filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.5));
      }

      .sub-title {
        font-size: 38px;
        font-weight: 500;
        color: #a5b4fc;
        letter-spacing: 4px;
        text-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
      }

      /* Light flare */
      .flare {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
      }
    </style>

    <div class="grid-overlay"></div>
    <div class="flare" id="flare-intro"></div>
    
    <!-- Particles -->
    <div class="particle" id="p1" style="top: 25%; left: 20%;"></div>
    <div class="particle" id="p2" style="top: 75%; left: 80%;"></div>
    <div class="particle" id="p3" style="top: 30%; left: 75%;"></div>
    <div class="particle" id="p4" style="top: 70%; left: 15%;"></div>

    <div class="logo-container">
      <img src="assets/images/tdu-logo-horizontal.png" alt="TDuMAIC" class="logo-img" id="logo-intro" />
      <div class="sub-title" id="sub-intro">下一代 AI 互动课堂生成平台 TDuMAIC</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance Animations (0.3s - 2.5s)
      tl.from("#logo-intro", { scale: 0.85, opacity: 0, duration: 1.2, ease: "power3.out" }, 0.3);
      tl.from("#sub-intro", { y: 35, opacity: 0, duration: 1.0, ease: "power2.out" }, 0.9);
      tl.from("#flare-intro", { scale: 0.5, opacity: 0, duration: 1.5, ease: "power1.out" }, 0.1);
      tl.from(".particle", { scale: 0, opacity: 0, stagger: 0.15, duration: 0.8, ease: "back.out" }, 0.5);

      // Micro drift/idle animation calculated based on scene duration (9s)
      const duration = 9;
      tl.to("#logo-intro", { y: -8, duration: 3.5, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.5);
      tl.to("#flare-intro", { x: 30, y: -20, duration: 4.5, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.0);
      tl.to("#p1", { y: -30, x: 20, duration: 3.0, ease: "sine.inOut", repeat: 2, yoyo: true }, 1.0);
      tl.to("#p2", { y: 20, x: -30, duration: 3.8, ease: "sine.inOut", repeat: 2, yoyo: true }, 1.0);
      tl.to("#p3", { y: -20, x: -20, duration: 3.2, ease: "sine.inOut", repeat: 2, yoyo: true }, 1.0);
      tl.to("#p4", { y: 30, x: 30, duration: 3.5, ease: "sine.inOut", repeat: 2, yoyo: true }, 1.0);

      window.__timelines["01-intro"] = tl;
    </script>
  </div>
</template>
